<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register OAuth Client</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff;
      --fg: #09090b;
      --muted: #71717a;
      --border: #e4e4e7;
      --card-bg: #ffffff;
      --card-shadow: 0 1px 3px 0 rgb(0 0 0 / .1), 0 1px 2px -1px rgb(0 0 0 / .1);
      --radius: 0.5rem;
      --btn-bg: #18181b;
      --btn-fg: #fafafa;
      --btn-hover: #27272a;
      --field-bg: #ffffff;
      --ring: #18181b;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #09090b;
        --fg: #fafafa;
        --muted: #a1a1aa;
        --border: #27272a;
        --card-bg: #18181b;
        --card-shadow: 0 1px 3px 0 rgb(0 0 0 / .4), 0 1px 2px -1px rgb(0 0 0 / .4);
        --btn-bg: #fafafa;
        --btn-fg: #18181b;
        --btn-hover: #e4e4e7;
        --field-bg: #09090b;
        --ring: #d4d4d8;
      }
    }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--fg);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 4px);
      box-shadow: var(--card-shadow);
      padding: 2rem;
    }
    h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; }
    p { margin-top: 0.35rem; color: var(--muted); font-size: 0.875rem; line-height: 1.4; }
    form { margin-top: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
    label { font-size: 0.875rem; font-weight: 500; }
    input {
      width: 100%;
      height: 2.375rem;
      padding: 0 0.75rem;
      font-size: 0.875rem;
      color: var(--fg);
      background: var(--field-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus {
      border-color: var(--ring);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--ring) 20%, transparent);
    }
    .row { display: grid; grid-template-columns: 1fr; gap: 0.5rem; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
    @media (min-width: 640px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }
    button {
      height: 2.375rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--btn-fg);
      background: var(--btn-bg);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    button:hover { background: var(--btn-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      display: none;
      font-size: 0.8125rem;
      color: #ef4444;
      background: color-mix(in srgb, #ef4444 10%, transparent);
      border: 1px solid color-mix(in srgb, #ef4444 25%, transparent);
      border-radius: var(--radius);
      padding: 0.625rem 0.75rem;
    }
    .result {
      display: none;
      margin-top: 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem;
      background: color-mix(in srgb, var(--card-bg) 70%, transparent);
      font-size: 0.875rem;
    }
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.85em;
      word-break: break-all;
    }
    .hint { margin-top: 0.75rem; font-size: 0.8125rem; color: var(--muted); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Register your application</h1>
    <p>Create an OAuth client. You’ll get a <b>client_id</b> and a <b>client_secret</b> (shown once).</p>

    <form id="clientForm" novalidate>
      <div id="errorMsg" class="error" role="alert"></div>

      <div class="row">
        <label for="name">Application name</label>
        <input id="name" name="name" placeholder="My App" required />
      </div>

      <div class="grid">
        <div class="row">
          <label for="appURL">Application URL</label>
          <input id="appURL" name="appURL" type="url" placeholder="https://myapp.com" required />
        </div>
        <div class="row">
          <label for="redirectURI">Redirect URL</label>
          <input id="redirectURI" name="redirectURI" type="url" placeholder="https://myapp.com/oauth/callback" required />
        </div>
      </div>

      <button type="submit" id="submitBtn">Create client</button>
    </form>

    <div id="result" class="result">
      <div><b>client_id</b>: <code id="clientId"></code></div>
      <div style="margin-top: 0.5rem;"><b>client_secret</b>: <code id="clientSecret"></code></div>
      <div class="hint">Store the secret securely. It will not be shown again.</div>
    </div>
  </div>

  <script>
    const form = document.getElementById('clientForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');
    const result = document.getElementById('result');
    const clientIdEl = document.getElementById('clientId');
    const clientSecretEl = document.getElementById('clientSecret');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }
    function hideError() {
      errorMsg.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      result.style.display = 'none';

      const name = document.getElementById('name').value.trim();
      const appURL = document.getElementById('appURL').value.trim();
      const redirectURI = document.getElementById('redirectURI').value.trim();

      if (!name || !appURL || !redirectURI) {
        showError('Please fill in all fields.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating…';
      try {
        const res = await fetch('/oauth/clients', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, appURL, redirectURI }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          showError(data.message || 'Unable to create client.');
          return;
        }
        clientIdEl.textContent = data.client_id;
        clientSecretEl.textContent = data.client_secret;
        result.style.display = 'block';
        form.reset();
      } catch {
        showError('Something went wrong. Please try again.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create client';
      }
    });
  </script>
</body>
</html>
