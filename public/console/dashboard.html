<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — KAuth Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/shared.css" />
  <style>
    .layout { display: grid; grid-template-columns: 240px 1fr; min-height: 100dvh; }
    @media (max-width: 768px) { .layout { grid-template-columns: 1fr; } .sidebar { display: none; } }
    .sidebar {
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      padding: 1.25rem;
    }
    .sidebar .logo { font-weight: 700; font-size: 1rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
    .sidebar .logo span { width: 28px; height: 28px; border-radius: 0.4rem; background: var(--primary); color: #fff; display: grid; place-items: center; font-size: 0.75rem; }
    .nav-link {
      display: block;
      padding: 0.5rem 0.75rem;
      border-radius: var(--radius);
      color: var(--fg);
      font-size: 0.875rem;
      margin-bottom: 0.25rem;
      text-decoration: none;
    }
    .nav-link.active { background: color-mix(in srgb, var(--primary) 12%, transparent); color: var(--primary); font-weight: 500; }
    .main { padding: 1.5rem 2rem; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .topbar h1 { font-size: 1.375rem; font-weight: 600; letter-spacing: -0.02em; }
    .user-pill { font-size: 0.8125rem; color: var(--muted); }
    .apps-grid { display: grid; gap: 0.75rem; }
    .app-card {
      padding: 1rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      text-decoration: none;
      color: inherit;
    }
    .app-card:hover { border-color: var(--primary); text-decoration: none; }
    .app-card h3 { font-size: 0.9375rem; font-weight: 600; }
    .app-card p { font-size: 0.8125rem; color: var(--muted); margin-top: 0.2rem; }
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }
    .empty p { margin-top: 0.5rem; font-size: 0.875rem; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo"><span>K</span> KAuth Console</div>
      <a class="nav-link active" href="/console/dashboard.html">Applications</a>
      <a class="nav-link" href="/.well-known/openid-configuration" target="_blank">OIDC discovery</a>
    </aside>
    <main class="main">
      <div class="topbar">
        <div>
          <h1>Applications</h1>
          <p class="user-pill" id="userEmail"></p>
        </div>
        <div style="display:flex;gap:0.5rem">
          <a class="btn btn-primary" href="/console/create-app.html">+ Create application</a>
          <button class="btn btn-outline" type="button" id="signOutBtn">Sign out</button>
        </div>
      </div>
      <div id="apps" class="apps-grid"></div>
      <div id="empty" class="card empty" style="display:none">
        <h3 style="color:var(--fg);font-size:1rem">No applications yet</h3>
        <p>Create your first OAuth client to get a client ID and secret.</p>
        <a class="btn btn-primary" href="/console/create-app.html" style="margin-top:1rem">Create application</a>
      </div>
    </main>
  </div>
  <script src="/js/console.js"></script>
  <script>
    document.getElementById('signOutBtn').addEventListener('click', signOut);

    (async () => {
      const user = await requireAuth();
      if (!user) return;
      document.getElementById('userEmail').textContent = user.email;

      const { res, data } = await api('/console/apps');
      if (!res.ok) return;

      const apps = data.apps || [];
      const container = document.getElementById('apps');
      const empty = document.getElementById('empty');

      if (!apps.length) {
        empty.style.display = 'block';
        return;
      }

      apps.forEach((app) => {
        const a = document.createElement('a');
        a.className = 'card app-card';
        a.href = `/console/app-detail.html?id=${app.id}`;
        a.innerHTML = `
          <div>
            <h3>${escapeHtml(app.name)}</h3>
            <p>${escapeHtml(app.appURL)}</p>
          </div>
          <div style="text-align:right">
            <span class="badge">OAuth 2.0</span>
            <p style="font-size:0.75rem;color:var(--muted);margin-top:0.35rem">Created ${formatDate(app.createdAt)}</p>
          </div>`;
        container.appendChild(a);
      });
    })();

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
  </script>
</body>
</html>
